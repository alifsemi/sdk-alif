CONFIG_PM=y
CONFIG_PM_DEVICE_SYSTEM_MANAGED=y
CONFIG_IDLE_STACK_SIZE=16384
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

CONFIG_COUNTER=y

CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_ASSERT=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=5
CONFIG_LOG_BACKEND_UART=y
CONFIG_PM_DEVICE_LOG_LEVEL_WRN=y

# Video/Camera
CONFIG_VIDEO=y
CONFIG_VIDEO_ALIF_CAM_EXTENDED=y
CONFIG_VIDEO_BUFFER_POOL_SZ_MAX=1048576
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=2
CONFIG_VIDEO_LOG_LEVEL_INF=y
CONFIG_I2C=y
CONFIG_I2C_TARGET=y
CONFIG_I2C_DW_CLOCK_SPEED=100
CONFIG_SYS_HEAP_AUTO=y
CONFIG_VIDEO_MIPI_CSI2_DW=y
CONFIG_MIPI_DPHY_LOG_LEVEL_DBG=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_USE_ALIF_ISP_LIB=y
CONFIG_ISP_LIB_SCALAR_MODULE=y
CONFIG_ISP_LIB_DMSC_MODULE=y
CONFIG_ISP_LIB_CCM_MODULE=n
CONFIG_ISP_LIB_WBM_MODULE=n
CONFIG_ISP_LIB_WB_MODULE=n
