CONFIG_CPP=y
CONFIG_STD_CPP17=y

# tflm
CONFIG_TENSORFLOW_LITE_MICRO=y
CONFIG_ARM_ETHOS_U=y

CONFIG_HEAP_MEM_POOL_SIZE=163840
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# std::exp
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_MIN_REQUIRED_HEAP_SIZE=163840

CONFIG_SYS_HEAP_SMALL_ONLY=y

# arm_math.h
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_FASTMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_MAIN_THREAD_PRIORITY=3
CONFIG_ISR_STACK_SIZE=4096
CONFIG_PRIVILEGED_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=2048

CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETLINE=y

CONFIG_CBPRINTF_FP_SUPPORT=y

# Audio input and output configurations
CONFIG_AUDIO=y

# I2S and audio codec for audio output
CONFIG_I2C=y
CONFIG_WM8904=y
CONFIG_AUDIO_CODEC=y


CONFIG_COUNTER_RTC_SNPS_DW=y
CONFIG_COUNTER_SNPS_DW=n
CONFIG_COUNTER_ALIF_UTIMER=n


# Power management configurations
CONFIG_ALIF_POWER_MGR_SHELL=n
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_POWER_DOMAIN=y
CONFIG_COUNTER=y
CONFIG_PM_S2RAM=y
CONFIG_PM_SAU_SAVE_RESTORE=y

#########
CONFIG_ASSERT=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_POWEROFF=y

# Enable push-to-talk mode for the ASR sample application
CONFIG_PUSH_TO_TALK=y
CONFIG_OUTPUT_TO_LINE_OUT=n

CONFIG_GPIO=y
CONFIG_LPGPIO_M55_IRQ_ENABLED=y

# ASR model is large, so we need to store it in external flash
CONFIG_MODEL_IN_EXT_FLASH=y
CONFIG_ALIF_OSPI_FLASH_XIP=y
CONFIG_OSPI_FLASH_IS25WX=y
CONFIG_OSPI=y
CONFIG_OSPI_FLASH=y
CONFIG_USE_ALIF_HAL_OSPI=y

# ####### Configuration supported with the updated Secure Enclave software
CONFIG_SE_SERVICE_INIT_PRIORITY=1
CONFIG_KERNEL_INIT_PRIORITY_DEFAULT=0
CONFIG_GPIO_INIT_PRIORITY=40
