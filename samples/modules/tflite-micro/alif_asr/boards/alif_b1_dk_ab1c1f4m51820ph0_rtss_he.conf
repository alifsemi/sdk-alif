CONFIG_ALIF_PM_SLEEP_ENABLE=1
CONFIG_LPGPIO_WAKEUP_SOURCE=0

# ####### Configuration supported with the updated Secure Enclave software
CONFIG_ALIF_EXT_WAKEUP_TIME=0
CONFIG_ALIF_OSC_WAKEUP_TIME=1700
CONFIG_ALIF_RM_WAKEUP_TIME=0
CONFIG_ALIF_EXT_WARMBOOT_WAKEUP_TIME=3000
CONFIG_ALIF_MAX_SLEEP_CLOCK_DRIFT=252
CONFIG_ALIF_MAX_ACTIVE_CLOCK_DRIFT=252
CONFIG_AUDIO_DMIC=y

# enable if CONFIG_OUTPUT_TO_LINE_OUT is set as ASR uses I2S for audio output
CONFIG_I2S=n
