# ExecuTorch module manifest for Zephyr RTOS
# This file enables fetching the ExecuTorch module using west
# Usage:
#   west config manifest.project-filter -- +executorch
#   west update

manifest:
  remotes:
    - name: pytorch
      url-base: https://github.com/pytorch

  projects:
    - name: executorch
      remote: pytorch
      # Pinned to the ExecuTorch commit that re-applies the *stable* PyTorch
      # 2.12.0 pin (PR #19699, "Reapply PyTorch 2.12 pin with CI fixes").
      # Using a stable torch release (instead of a nightly) is deliberate:
      # nightly wheels are purged from the PyTorch index after a few weeks,
      # which previously forced the override script to chase the "latest"
      # nightly and silently break ABI/op-schema compatibility with the
      # ExecuTorch source (e.g. aten.transpose.Dimname errors). Stable
      # releases are permanent, so this pairing never goes stale.
      revision: 45fe55c49c70a5fc741833eeb99fb023ffb4646f
      path: modules/lib/executorch
      groups:
        - executorch
