CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

# Display subsystem + CDC200 driver
CONFIG_DISPLAY=y
CONFIG_MIPI_DSI=n

# Heap for buffer allocations
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_SYS_HEAP_AUTO=y

# Logging
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_DISPLAY_LOG_LEVEL_INF=y
