common:
  tags:
    - drivers
    - counter
    - alif
  depends_on: counter
  harness: ztest
  timeout: 600

tests:
  drivers.counter.alif_utimer:
    extra_args:
      - DTC_OVERLAY_FILE=boards/alif_utimer.overlay
    integration_platforms:
      - alif_e8_dk/ae822fa0e5597xx0/rtss_he
      - alif_e8_dk/ae822fa0e5597xx0/rtss_hp
      - alif_e7_dk/ae722f80f55d5xx/rtss_he
      - alif_e7_dk/ae722f80f55d5xx/rtss_hp
    platform_allow:
      - alif_e8_dk/ae822fa0e5597xx0/rtss_he
      - alif_e8_dk/ae822fa0e5597xx0/rtss_hp
      - alif_e7_dk/ae722f80f55d5xx/rtss_he
      - alif_e7_dk/ae722f80f55d5xx/rtss_hp

  drivers.counter.alif_lputimer:
    extra_args:
      - DTC_OVERLAY_FILE=boards/alif_lputimer.overlay
    integration_platforms:
      - alif_b1_dk/ab1c1f4m51820ph0/rtss_he
    platform_allow:
      - alif_b1_dk/ab1c1f4m51820ph0/rtss_he
