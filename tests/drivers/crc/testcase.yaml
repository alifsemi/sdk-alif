      - CONFIG_TEST_CRC_32=y
      - CONFIG_TEST_CRC_STRESS=y
    extra_dtc_overlay_files:
      - boards/crc0_32_bit.overlay

  drivers.crc.crc1_8_bit_stress:
    extra_configs:
      - CONFIG_TEST_CRC_8=y
      - CONFIG_TEST_CRC_STRESS=y
    extra_dtc_overlay_files:
      - boards/crc1_8_bit.overlay

  drivers.crc.crc1_16_bit_stress:
    extra_configs:
      - CONFIG_TEST_CRC_16=y
      - CONFIG_TEST_CRC_STRESS=y
    extra_dtc_overlay_files:
