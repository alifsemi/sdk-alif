      - CONFIG_TEST_CRC_32=y
    extra_dtc_overlay_files:
      - boards/crc1_32_bit.overlay

  drivers.crc.crc1_32_bit_custom_poly:
    extra_configs:
      - CONFIG_TEST_CRC_32_CUSTOM_POLY=y
    extra_dtc_overlay_files:
      - boards/crc1_32_bit.overlay

  drivers.crc.crc0_32c:
    extra_configs:
      - CONFIG_TEST_CRC_32C=y
    extra_dtc_overlay_files:
      - boards/crc0_32_bit.overlay

  drivers.crc.crc1_32c:
    extra_configs:
      - CONFIG_TEST_CRC_32C=y
    extra_dtc_overlay_files:
      - boards/crc1_32_bit.overlay

  drivers.crc.crc0_8_bit_stress:
    extra_configs:
      - CONFIG_TEST_CRC_8=y
      - CONFIG_TEST_CRC_STRESS=y
    extra_dtc_overlay_files:
      - boards/crc0_8_bit.overlay

  drivers.crc.crc0_16_bit_stress:
