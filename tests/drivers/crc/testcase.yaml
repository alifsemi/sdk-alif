common:
  tags: drivers crc
  depends_on: crc
  harness: ztest
  platform_allow:
    - alif_e7_dk
  integration_platforms:
    - alif_e7_dk

tests:
  drivers.crc.crc0_8_bit:
    extra_configs:
      - CONFIG_TEST_CRC_8=y
    extra_dtc_overlay_files:
      - boards/crc0_8_bit.overlay

  drivers.crc.crc0_16_bit:
    extra_configs:
      - CONFIG_TEST_CRC_16=y
    extra_dtc_overlay_files:
      - boards/crc0_16_bit.overlay

  drivers.crc.crc0_32_bit:
    extra_configs:
      - CONFIG_TEST_CRC_32=y
    extra_dtc_overlay_files:
      - boards/crc0_32_bit.overlay

  drivers.crc.crc0_32_bit_custom_poly:
    extra_configs:
      - CONFIG_TEST_CRC_32_CUSTOM_POLY=y
    extra_dtc_overlay_files:
      - boards/crc0_32_bit.overlay

  drivers.crc.crc1_8_bit:
    extra_configs:
      - CONFIG_TEST_CRC_8=y
    extra_dtc_overlay_files:
      - boards/crc1_8_bit.overlay

  drivers.crc.crc1_16_bit:
    extra_configs:
      - CONFIG_TEST_CRC_16=y
    extra_dtc_overlay_files:
      - boards/crc1_16_bit.overlay

  drivers.crc.crc1_32_bit:
