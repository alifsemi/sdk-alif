# DMA-specific configuration for the UART DMA async-API test suite.
#
# Kept separate from prj.conf so that the DMA / async-API options do not
# affect the non-DMA UART test suites (internal/external loopback,
# RTS/CTS, LP-UART).
#
# Use with the DMA overlay, e.g.:
#   west build ... -DEXTRA_CONF_FILE=dma.conf \
#       -DDTC_OVERLAY_FILE="boards/alif_uart_dma.overlay"

CONFIG_UART_ASYNC_API=y
CONFIG_DMA=y
CONFIG_DMA_PL330=y
CONFIG_TEST_UART_DMA=y
