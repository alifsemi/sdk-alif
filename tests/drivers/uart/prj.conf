CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_ZTEST=y
CONFIG_EVENTS=y
CONFIG_LOG=y

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Enable the test suites you need (all default to n):
CONFIG_TEST_INTERNAL_LB=y
# CONFIG_TEST_EXTERNAL_LB=n
# CONFIG_TEST_UART_RTSCTS=n
# CONFIG_TEST_LPUART=n
#
# The DMA async-API suite needs the DMA / async-API options that live in
# the dedicated dma.conf, kept separate so they do not affect the
# non-DMA suites. Build it with, e.g.:
#   -DEXTRA_CONF_FILE=dma.conf -DDTC_OVERLAY_FILE="boards/alif_uart_dma.overlay"
