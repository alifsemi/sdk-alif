# Debug
CONFIG_LOG=y
CONFIG_HW_STACK_PROTECTION=y
CONFIG_DEBUG_THREAD_INFO=y

# Serial / Shell
CONFIG_SERIAL=y
CONFIG_GPIO=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SHELL=y
CONFIG_SHELL_STACK_SIZE=5120

# Stack sizes
CONFIG_MAIN_STACK_SIZE=5120
CONFIG_NET_TX_STACK_SIZE=5120
CONFIG_NET_RX_STACK_SIZE=5120
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=5120

# Network
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20
CONFIG_NET_BUF_DATA_SIZE=1024
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_MAX_CONN=16
CONFIG_NET_OFFLOAD=y
CONFIG_WIFI_OFFLOAD=y
CONFIG_ZVFS_POLL_MAX=16

# DNS
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_MAX_SERVERS=2

# Wi-Fi
CONFIG_WIFI=y
CONFIG_WIFI_AIROC=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_KERNEL_MEM_POOL=y

# SDIO / SDHC
CONFIG_SDIO_STACK=y
CONFIG_SD_UHS_PROTOCOL=y
CONFIG_SDHC_RSP_136_HAS_CRC=y
CONFIG_SDHC_DWC=y

# Init priority: regulators (default) < SDHC (85 default) < WiFi (90)
CONFIG_WIFI_INIT_PRIORITY=90

# Regulator
CONFIG_REGULATOR=y

# ztest
CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=8192
